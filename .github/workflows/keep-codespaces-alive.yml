name: Keep Codespaces Alive

on:
  schedule:
    - cron: '0 0 1,21 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Keep scheduled workflow active
        run: |
          set -euo pipefail

          last_commit_ts=$(git log -1 --format=%ct)
          now_ts=$(date +%s)
          age_days=$(( (now_ts - last_commit_ts) / 86400 ))
          echo "Last repository commit is ${age_days} days old."

          if [ "$age_days" -lt 45 ]; then
            echo "No repository keep-alive commit needed yet."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep scheduled workflows active"
          git push

      - name: Keep all stopped Codespaces alive
        env:
          GH_TOKEN: ${{ secrets.CODESPACES_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "CODESPACES_PAT is not set."
            exit 1
          fi

          echo "=== Codespace Keep-Alive ==="
          CODESPACES=$(curl -fsS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/user/codespaces")
          echo "$CODESPACES" | jq -c '.codespaces[]?' | while read -r cs; do
            NAME=$(echo "$cs" | jq -r '.name')
            STATE=$(echo "$cs" | jq -r '.state')
            echo "Codespace: $NAME / State: $STATE"
            if [ "$STATE" = "Shutdown" ] || [ "$STATE" = "Available" ]; then
              curl -fsS -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/user/codespaces/$NAME/start"
              sleep 15
              curl -fsS -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/user/codespaces/$NAME/stop"
              echo "Refreshed: $NAME"
            fi
          done
          echo "=== Done ==="
